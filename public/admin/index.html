<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>ניהול — נתיבותיה שלום</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    /* ══════════════════════════════════════════
       Base
    ══════════════════════════════════════════ */
    *, *::before, *::after {
      font-family: 'Heebo', sans-serif !important;
      box-sizing: border-box;
    }

    html, body {
      direction: rtl;
      background: #f0ece3;
      margin: 0;
      padding: 0;
    }

    /* ══════════════════════════════════════════
       Logo מוזרק ע"י JS
    ══════════════════════════════════════════ */
    #cms-logo {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 28px 0 20px;
      order: -1;
      flex-shrink: 0;
      border-inline-end: 1px solid rgba(201,168,76,0.3);
      height: 100%;
    }

    .cms-logo-icon {
      font-size: 2rem;
      color: #C9A84C;
      line-height: 1;
      text-shadow: 0 0 20px rgba(201,168,76,0.45);
    }

    .cms-logo-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .cms-logo-title {
      font-size: 1.25rem;
      font-weight: 800;
      color: #f0e4b8;
      letter-spacing: 0.4px;
      line-height: 1.2;
    }

    .cms-logo-subtitle {
      font-size: 0.62rem;
      color: rgba(201,168,76,0.7);
      font-weight: 500;
      letter-spacing: 1.4px;
      text-transform: uppercase;
    }

    /* ══════════════════════════════════════════
       Header
    ══════════════════════════════════════════ */
    #nc-root header {
      background: linear-gradient(120deg, #152540 0%, #1B2E4B 55%, #243d63 100%) !important;
      min-height: 72px !important;
      padding: 0 !important;
      display: flex !important;
      align-items: center !important;
      box-shadow: 0 3px 18px rgba(0,0,0,0.32) !important;
      flex-shrink: 0 !important;
      border-bottom: 2px solid rgba(201,168,76,0.4) !important;
    }

    #nc-root header > div,
    #nc-root header > nav {
      direction: rtl !important;
      display: flex !important;
      flex-direction: row !important;
      align-items: center !important;
      width: 100% !important;
      height: 72px !important;
      padding: 0 12px 0 20px !important;
      gap: 4px !important;
    }

    /* Hide default CMS logo */
    #nc-root header a[href="/"],
    #nc-root header [class*="AppHeaderTitle"],
    #nc-root header [class*="BrandTitle"] {
      display: none !important;
    }

    #nc-root header a,
    #nc-root header button,
    #nc-root header span {
      color: #e8dfc8 !important;
    }

    /* Header nav buttons — taller, styled */
    #nc-root header button,
    #nc-root header [class*="Button"] {
      height: 40px !important;
      padding: 0 18px !important;
      border-radius: 8px !important;
      font-size: 0.875rem !important;
      font-weight: 600 !important;
      transition: all 0.18s ease !important;
    }

    #nc-root header button:hover {
      color: #C9A84C !important;
      background: rgba(201,168,76,0.14) !important;
    }

    /* "New entry" / Quick-add button */
    #nc-root header [class*="Quick"],
    #nc-root header [class*="AppHeader"] [class*="Button"] {
      border: 1.5px solid rgba(201,168,76,0.55) !important;
      color: #C9A84C !important;
      border-radius: 8px !important;
      background: rgba(201,168,76,0.1) !important;
    }

    #nc-root header [class*="Quick"]:hover,
    #nc-root header [class*="AppHeader"] [class*="Button"]:hover {
      background: rgba(201,168,76,0.22) !important;
      border-color: #C9A84C !important;
    }

    /* ══════════════════════════════════════════
       Sidebar / Nav  (ימין — חיפוש + קטגוריות)
    ══════════════════════════════════════════ */
    #nc-root nav,
    #nc-root [class*="Sidebar"],
    #nc-root [class*="sidebar"] {
      position: relative !important;
      width: 280px !important;
      min-width: 280px !important;
      max-width: 280px !important;
      flex-shrink: 0 !important;
      height: 100% !important;
      overflow-y: auto !important;
      overflow-x: hidden !important;
      background: #faf7f2 !important;
      border-left: none !important;
      border-right: none !important;
      border-inline-end: 3px solid #C9A84C !important;
      direction: rtl !important;
      padding-top: 6px !important;
    }

    /* Search box */
    #nc-root nav input[type="search"],
    #nc-root nav input[type="text"],
    #nc-root [class*="SearchInput"] {
      margin: 10px 12px 6px !important;
      width: calc(100% - 24px) !important;
      background: #fff !important;
      border: 1.5px solid #d6cfc3 !important;
      border-radius: 8px !important;
      padding: 9px 12px !important;
      font-size: 0.9rem !important;
      direction: rtl !important;
    }

    #nc-root nav a,
    #nc-root nav button,
    #nc-root nav span,
    #nc-root nav li {
      direction: rtl !important;
      text-align: right !important;
    }

    /* Category section headings */
    #nc-root nav h2,
    #nc-root nav h3,
    #nc-root nav [class*="Heading"],
    #nc-root nav [class*="heading"] {
      color: #8a7a5e !important;
      font-size: 0.64rem !important;
      font-weight: 800 !important;
      text-transform: uppercase !important;
      letter-spacing: 1.6px !important;
      padding: 18px 16px 6px !important;
      border-top: 1px solid rgba(201,168,76,0.15) !important;
      margin-top: 6px !important;
    }

    /* Nav links */
    #nc-root nav a {
      color: #2c3e50 !important;
      border-radius: 7px !important;
      margin: 1px 10px !important;
      padding: 9px 14px !important;
      font-weight: 500 !important;
      font-size: 0.9rem !important;
      display: flex !important;
      align-items: center !important;
      transition: all 0.15s ease !important;
    }

    #nc-root nav a:hover {
      background: rgba(201,168,76,0.13) !important;
      color: #1B2E4B !important;
    }

    /* Active link */
    #nc-root nav a[class*="active"],
    #nc-root nav [class*="active"] > a,
    #nc-root nav li[class*="active"] a {
      background: rgba(27,46,75,0.09) !important;
      color: #1B2E4B !important;
      font-weight: 700 !important;
      border-inline-end: 3px solid #C9A84C !important;
      border-radius: 7px 0 0 7px !important;
      margin-inline-end: 0 !important;
    }

    /* ══════════════════════════════════════════
       אזור תוכן ראשי  (שמאל)
    ══════════════════════════════════════════ */
    #nc-root main,
    #nc-root [class*="MainView"],
    #nc-root [class*="mainView"] {
      direction: rtl !important;
      background: #f5f1ea !important;
    }

    /* Collection page header */
    #nc-root [class*="CollectionHeader"],
    #nc-root [class*="collectionHeader"] {
      background: #fff !important;
      border-bottom: 2px solid rgba(201,168,76,0.3) !important;
      padding: 20px 28px !important;
      direction: rtl !important;
    }

    #nc-root [class*="CollectionHeader"] h1,
    #nc-root [class*="CollectionHeader"] h2 {
      color: #1B2E4B !important;
      font-size: 1.5rem !important;
      font-weight: 800 !important;
    }

    /* Entry cards */
    #nc-root [class*="EntryCard"],
    #nc-root [class*="Card"],
    #nc-root [class*="card"] {
      border-radius: 10px !important;
      box-shadow: 0 2px 8px rgba(27,46,75,0.07) !important;
      border: 1px solid rgba(201,168,76,0.25) !important;
      background: #fff !important;
      transition: box-shadow 0.2s ease, border-color 0.2s ease !important;
      direction: rtl !important;
      text-align: right !important;
    }

    #nc-root [class*="EntryCard"]:hover,
    #nc-root [class*="Card"]:hover {
      box-shadow: 0 6px 20px rgba(27,46,75,0.13) !important;
      border-color: #C9A84C !important;
    }

    /* ══════════════════════════════════════════
       Editor toolbar
    ══════════════════════════════════════════ */
    #nc-root [class*="EditorToolbar"],
    #nc-root [class*="Toolbar"] {
      background: #fff !important;
      border-bottom: 2px solid rgba(201,168,76,0.4) !important;
      direction: rtl !important;
    }

    #nc-root [class*="Toolbar"] button[class*="success"],
    #nc-root [class*="Toolbar"] button[class*="Publish"],
    #nc-root [class*="publish"] {
      background: #1B2E4B !important;
      color: #fff !important;
      border-radius: 6px !important;
      font-weight: 700 !important;
      border: none !important;
    }

    #nc-root [class*="Toolbar"] button[class*="success"]:hover {
      background: #C9A84C !important;
      color: #1B2E4B !important;
    }

    /* ══════════════════════════════════════════
       Buttons — global
    ══════════════════════════════════════════ */
    #nc-root button[class*="primary"],
    #nc-root [class*="Button"][class*="primary"],
    #nc-root [class*="button"][class*="primary"] {
      background: #1B2E4B !important;
      color: #fff !important;
      border-radius: 6px !important;
      border: none !important;
      font-weight: 600 !important;
    }

    #nc-root button[class*="primary"]:hover {
      background: #243d63 !important;
    }

    #nc-root button[class*="secondary"],
    #nc-root [class*="Button"][class*="secondary"] {
      border: 2px solid #1B2E4B !important;
      color: #1B2E4B !important;
      border-radius: 6px !important;
      background: transparent !important;
      font-weight: 600 !important;
    }

    /* ══════════════════════════════════════════
       Form fields
    ══════════════════════════════════════════ */
    #nc-root label,
    #nc-root [class*="FieldLabel"],
    #nc-root [class*="label"] {
      color: #1B2E4B !important;
      font-weight: 600 !important;
      direction: rtl !important;
      text-align: right !important;
      display: block !important;
    }

    #nc-root [class*="FieldHint"],
    #nc-root [class*="hint"] {
      color: #8a7a5e !important;
      font-size: 0.8rem !important;
      direction: rtl !important;
      text-align: right !important;
    }

    #nc-root input[type="text"],
    #nc-root input[type="email"],
    #nc-root input[type="search"],
    #nc-root input[type="url"],
    #nc-root textarea,
    #nc-root select {
      direction: rtl !important;
      text-align: right !important;
      border-radius: 6px !important;
      border: 1.5px solid #d6cfc3 !important;
      background: #fff !important;
      transition: border-color 0.15s ease, box-shadow 0.15s ease !important;
    }

    #nc-root input:focus,
    #nc-root textarea:focus,
    #nc-root select:focus {
      border-color: #C9A84C !important;
      box-shadow: 0 0 0 3px rgba(201,168,76,0.18) !important;
      outline: none !important;
    }

    /* ══════════════════════════════════════════
       Login / Auth page
    ══════════════════════════════════════════ */
    #nc-root [class*="AuthenticationPage"],
    #nc-root [class*="Login"] {
      background: linear-gradient(150deg, #1B2E4B 0%, #2a4570 100%) !important;
    }

    #nc-root [class*="AuthenticationPage"] h1,
    #nc-root [class*="Login"] h1 {
      color: #C9A84C !important;
      font-weight: 800 !important;
    }

    #nc-root [class*="AuthenticationPage"] button,
    #nc-root [class*="Login"] button {
      background: #C9A84C !important;
      color: #1B2E4B !important;
      font-weight: 700 !important;
      border-radius: 8px !important;
      border: none !important;
    }

    /* ══════════════════════════════════════════
       Markdown editor
    ══════════════════════════════════════════ */
    #nc-root [class*="MarkdownControlEle"],
    #nc-root [class*="RawEditor"],
    #nc-root .EasyMDEContainer textarea,
    #nc-root [class*="CodeMirror"] {
      direction: rtl !important;
      text-align: right !important;
    }

    /* ══════════════════════════════════════════
       Toasts / notifications
    ══════════════════════════════════════════ */
    #nc-root [class*="Toast"][class*="success"],
    #nc-root [class*="Notification"][class*="success"] {
      background: #1B2E4B !important;
      border-left: 4px solid #C9A84C !important;
    }
  </style>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    /* ─── Netlify Identity ─── */
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on('init', user => {
        if (!user) {
          window.netlifyIdentity.on('login', () => {
            document.location.href = '/admin/';
          });
        }
      });
    }

    /* ─── Inject custom logo into header ─── */
    function injectLogo() {
      const header = document.querySelector('#nc-root header');
      if (!header || document.getElementById('cms-logo')) return;
      const logo = document.createElement('div');
      logo.id = 'cms-logo';
      logo.setAttribute('aria-label', 'נתיבותיה שלום — ניהול');
      logo.innerHTML =
        '<span class="cms-logo-icon">✦</span>' +
        '<div class="cms-logo-text">' +
          '<span class="cms-logo-title">נתיבותיה שלום</span>' +
          '<span class="cms-logo-subtitle">ממשק ניהול</span>' +
        '</div>';
      header.prepend(logo);
    }

    /* ─── Two-column layout: header / (nav | main) ─── */
    function fixLayout() {
      const rootDiv = document.querySelector('#nc-root > div');
      if (!rootDiv) return;

      const nav = rootDiv.querySelector('nav');
      if (!nav) return;

      // App wrapper: full-viewport flex column
      Object.assign(rootDiv.style, {
        display:       'flex',
        flexDirection: 'column',
        height:        '100vh',
        overflow:      'hidden',
      });

      // Header: natural height, don't grow
      const header = rootDiv.querySelector('header');
      if (header) header.style.flexShrink = '0';

      // Body row (nav + main): fills remaining height
      const bodyContainer = nav.parentElement;
      if (!bodyContainer || bodyContainer === rootDiv) return;

      Object.assign(bodyContainer.style, {
        display:       'flex',
        flexDirection: 'row',
        flex:          '1 1 auto',
        minHeight:     '0',
        overflow:      'hidden',
      });

      // Sidebar (ימין) — fixed width
      Object.assign(nav.style, {
        position:   'relative',
        flexShrink: '0',
        width:      '280px',
        minWidth:   '280px',
        height:     '100%',
        overflowY:  'auto',
        overflowX:  'hidden',
      });

      // Main content (שמאל) — fills remaining width
      Array.from(bodyContainer.children).forEach(el => {
        if (el === nav) return;
        Object.assign(el.style, {
          flex:      '1 1 auto',
          minWidth:  '0',
          height:    '100%',
          overflowY: 'auto',
        });
      });
    }

    const observer = new MutationObserver(() => {
      injectLogo();
      fixLayout();
    });
    observer.observe(document.body, { childList: true, subtree: true });
  </script>
</body>
</html>

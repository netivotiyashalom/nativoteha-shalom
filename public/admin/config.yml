  # ─────────────────────────────────────────
  # 3. קטגוריות
  # ─────────────────────────────────────────
  - name: categories
    label: "קטגוריות"
    files:
      - name: parashiyot
        label: "פרשות השבוע"
        file: src/data/categories/parashiyot.json
        fields:
          - label: "רשימת הפרשות"
            name: items
            widget: list
            summary: "{{fields.name}} ({{fields.sefer}})"
            fields:
              - { label: "מזהה (אנגלית)",  name: id,    widget: string }
              - { label: "שם הפרשה",       name: name,  widget: string }
              - { label: "שם הספר",        name: sefer, widget: string }

      - name: hagim
        label: "חגים ומועדים"
        file: src/data/categories/hagim.json
        fields:
          - label: "רשימת החגים"
            name: items
            widget: list
            summary: "{{fields.name}}"
            fields:
              - { label: "מזהה (אנגלית)", name: id,   widget: string }
              - { label: "שם החג",        name: name, widget: string }

      - name: nosim
        label: "נושאים שונים"
        file: src/data/categories/nosim.json
        fields:
          - label: "רשימת הנושאים"
            name: items
            widget: list
            summary: "{{fields.name}}"
            fields:
              - { label: "מזהה (אנגלית)", name: id,   widget: string }
              - { label: "שם הנושא",      name: name, widget: string }

  # ─────────────────────────────────────────
  # 4. עמודים
  # ─────────────────────────────────────────
  - name: pages
    label: "עמודים"
    files:
      - name: about
        label: "עמוד אודות"
        file: src/data/pages/about.md
        fields:
          - { label: "כותרת",  name: title, widget: string }
          - { label: "תוכן",   name: body,  widget: markdown }

      - name: privacy
        label: "מדיניות פרטיות"
        file: src/data/pages/privacy.md
        fields:
          - { label: "כותרת",       name: title,   widget: string }
          - { label: "תאריך עדכון", name: updated, widget: string, required: false }
          - { label: "תוכן",        name: body,     widget: markdown }

  # ─────────────────────────────────────────
  # 5. הגדרות האתר
  # ─────────────────────────────────────────
  - name: settings
    label: "הגדרות האתר"
    files:
      - name: general
        label: "הגדרות כלליות"
        file: src/data/settings.json
        fields:
          - label: "שם האתר"
            name: siteName
            widget: string

          - label: "תיאור האתר"
            name: tagline
            widget: string

          - label: "מייל המנהל"
            name: adminEmail
            widget: string
            hint: "כתובת לקבלת תגובות ופניות"

          - label: "מצב תחזוקה"
            name: maintenanceMode
            widget: boolean
            default: false
            hint: "כאשר פעיל — מבקרים רגילים רואים עמוד 'בבנייה'"

          - label: "צבע ראשי (כחול)"
            name: colorBlue
            widget: color
            default: "#1B2E4B"

          - label: "צבע הדגשה (זהב)"
            name: colorGold
            widget: color
            default: "#C9A84C"

          - label: "צבע רקע"
            name: colorBg
            widget: color
            default: "#f9f7f2"

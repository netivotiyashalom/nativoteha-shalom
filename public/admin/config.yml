          - { label: "כי תשא",      value: ki-tisa       }
          - { label: "ויקהל",       value: vayakhel      }
          - { label: "פקודי",       value: pekudei       }
          - { label: "ויקרא",       value: vayikra       }
          - { label: "צו",          value: tzav          }
          - { label: "שמיני",       value: shmini        }
          - { label: "תזריע",       value: tazria        }
          - { label: "מצורע",       value: metzora       }
          - { label: "אחרי מות",    value: acharei-mot   }
          - { label: "קדושים",      value: kedoshim      }
          - { label: "אמור",        value: emor          }
          - { label: "בהר",         value: behar         }
          - { label: "בחוקותי",     value: bechukotai    }
          - { label: "במדבר",       value: bamidbar      }
          - { label: "נשא",         value: nasso         }
          - { label: "בהעלותך",     value: behaalocha    }
          - { label: "שלח",         value: shlach        }
          - { label: "קרח",         value: korach        }
          - { label: "חוקת",        value: chukat        }
